# CI baseline for the security-knowledge service.
# Item ref: TODO P0.4
#
# What runs here:
#   - ruff lint + format check
#   - mypy type check (configured in pyproject.toml [tool.mypy])
#   - pytest (fully mocked DB/auth — no real Postgres required)
#
# Intentionally NOT here yet:
#   - Manifest drift check (deferred to item A3 — see TODO below)
#   - Postgres-backed integration tests (requires a live DB; deferred)

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: security-knowledge

jobs:
  security-knowledge-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: security-knowledge/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check app tests

      - name: Format check (ruff format)
        run: ruff format --check app tests

      - name: Type check (mypy)
        run: mypy app

      - name: Test
        run: pytest -q --maxfail=5

    # TODO(a3): once dump_mcp_manifest CLI lands, add a step that diffs mcp-tool-manifest.json against the live dump.
