name: Secret Scanner

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can diff every commit in the push
          fetch-depth: 0

      - name: Run gitleaks
        # Pin to a specific release tag; for maximum supply-chain hardness
        # replace the tag with the immutable commit SHA once network access allows:
        #   git ls-remote https://github.com/gitleaks/gitleaks-action refs/tags/v2.3.9
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set to "protect" to block the push on findings;
          # set to "detect" to report only (non-blocking).
          GITLEAKS_MODE: protect
