# Security Knowledge service sub-apps at https://z.je
# Include inside the z.je :443 vhost with:
#   Include /etc/apache2/sites-available/zje-sk-proxy.conf
# then: sudo systemctl reload apache2
#
# Requires: a2enmod proxy proxy_http headers (already enabled for estate proxy)

ProxyPreserveHost On
ProxyRequests Off
RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-Host "z.je"

<Location /ui>
    ProxyPass        http://127.0.0.1:8010/ui
    ProxyPassReverse http://127.0.0.1:8010/ui
</Location>

<Location /api/v1>
    ProxyPass        http://127.0.0.1:8010/api/v1
    ProxyPassReverse http://127.0.0.1:8010/api/v1
</Location>

<Location /health>
    ProxyPass        http://127.0.0.1:8010/health
    ProxyPassReverse http://127.0.0.1:8010/health
</Location>

<Location /docs>
    ProxyPass        http://127.0.0.1:8010/docs
    ProxyPassReverse http://127.0.0.1:8010/docs
</Location>

<Location /openapi.json>
    ProxyPass        http://127.0.0.1:8010/openapi.json
    ProxyPassReverse http://127.0.0.1:8010/openapi.json
</Location>

<Location /graphql>
    ProxyPass        http://127.0.0.1:8010/graphql
    ProxyPassReverse http://127.0.0.1:8010/graphql
</Location>
