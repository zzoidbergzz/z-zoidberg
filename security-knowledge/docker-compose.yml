version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sk:sk@db/sk
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: python -m arq app.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://sk:sk@db/sk
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sk
      POSTGRES_USER: sk
      POSTGRES_PASSWORD: sk
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
