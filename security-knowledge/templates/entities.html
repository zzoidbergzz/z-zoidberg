{% extends "base.html" %}
{% block title %}Entities · z.je{% endblock %}
{% block content %}
<main class="page-shell">
  <header class="page-header">
    <h1>Entities</h1>
    <p class="page-sub">Browse and filter the threat intelligence entity catalogue.</p>
  </header>

  <section class="panel">
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem;">
      <input class="form-input mono" type="text" id="q-input" placeholder="Search by name…" style="flex:1;min-width:12rem;">
      <select class="form-input" id="kind-select" style="min-width:10rem;">
        <option value="">All kinds</option>
        <option value="cve">CVE</option>
        <option value="malware">Malware</option>
        <option value="actor">Actor</option>
        <option value="tool">Tool</option>
        <option value="technique">Technique</option>
        <option value="tactic">Tactic</option>
        <option value="vulnerability">Vulnerability</option>
        <option value="domain">Domain</option>
        <option value="ip_address">IP Address</option>
        <option value="hash">Hash</option>
        <option value="campaign">Campaign</option>
        <option value="report">Report</option>
      </select>
      <button class="button" id="search-btn">Filter</button>
    </div>
    <div id="status" class="status-bar"></div>
    <table class="table" id="entities-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Kind</th>
          <th>Aliases</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody id="entities-body">
        <tr><td colspan="4" class="muted">Loading…</td></tr>
      </tbody>
    </table>
  </section>
</main>

<script>
(function () {
  const body = document.getElementById("entities-body");
  const status = document.getElementById("status");

  async function load() {
    const q = document.getElementById("q-input").value.trim();
    const kind = document.getElementById("kind-select").value;
    const params = new URLSearchParams({ limit: 50 });
    if (q) params.set("q", q);
    if (kind) params.set("kind", kind);
    status.textContent = "Loading…";
    body.innerHTML = '<tr><td colspan="4" class="muted">Loading…</td></tr>';
    try {
      const resp = await fetch("/api/v1/entities/?" + params, { credentials: "same-origin" });
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const data = await resp.json();
      const items = Array.isArray(data) ? data : (data.items || data.results || []);
      status.textContent = "";
      if (!items.length) {
        body.innerHTML = '<tr><td colspan="4"><div class="empty-state">No entities found.</div></td></tr>';
        return;
      }
      body.innerHTML = items.map(e => {
        const aliases = (e.aliases || []).join(", ") || "—";
        const created = e.created_at ? new Date(e.created_at).toLocaleDateString() : "—";
        return `<tr>
          <td><a href="/entities/${e.id}">${esc(e.name || e.id)}</a></td>
          <td><span class="tiny-pill">${esc(e.kind || "")}</span></td>
          <td class="subtle">${esc(aliases)}</td>
          <td class="subtle">${esc(created)}</td>
        </tr>`;
      }).join("");
    } catch (err) {
      status.textContent = "Error: " + err.message;
      body.innerHTML = '<tr><td colspan="4" class="muted">Failed to load.</td></tr>';
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  document.getElementById("search-btn").addEventListener("click", load);
  document.getElementById("q-input").addEventListener("keydown", e => { if (e.key === "Enter") load(); });
  document.getElementById("kind-select").addEventListener("change", load);
  load();
})();
</script>
{% endblock %}
