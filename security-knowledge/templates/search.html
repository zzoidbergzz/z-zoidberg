{% extends "base.html" %}
{% block title %}Intel Search · z.je{% endblock %}
{% block content %}
<main class="page-shell">
  <header class="page-header">
    <h1>Threat Intel Search</h1>
    <p class="page-sub">Full-text search across entities, CVEs, MITRE TTPs, threat actors and more.</p>
  </header>

  <section class="panel">
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;">
      <input class="form-input mono" type="text" id="q-input"
             placeholder="CVE-2021-44228, T1059, Log4Shell, APT29…"
             style="flex:1;min-width:14rem;" autocomplete="off">
      <button class="button" id="search-btn">Search</button>
      <button class="button-muted" id="search-web-btn">Extend Web</button>
    </div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;align-items:center;">
      <label style="display:flex;align-items:center;gap:0.35rem;" class="muted">
        <input type="checkbox" id="web-fallback-toggle" checked>
        Auto web fallback
      </label>
      <label style="display:flex;align-items:center;gap:0.35rem;" class="muted">
        Category
        <select id="web-category" class="form-input" style="padding:0.25rem 0.45rem; min-width:8rem;">
          <option value="general" selected>general</option>
          <option value="news">news</option>
          <option value="it">it</option>
          <option value="science">science</option>
        </select>
      </label>
    </div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.6rem;" id="filter-bar">
      <button class="tiny-pill filter-chip active" data-filter="">All</button>
      <button class="tiny-pill filter-chip" data-filter="cve">CVE</button>
      <button class="tiny-pill filter-chip" data-filter="technique">Technique</button>
      <button class="tiny-pill filter-chip" data-filter="attack_pattern">ATT&amp;CK</button>
      <button class="tiny-pill filter-chip" data-filter="actor">Actor</button>
      <button class="tiny-pill filter-chip" data-filter="malware">Malware</button>
      <button class="tiny-pill filter-chip" data-filter="tool">Tool</button>
      <button class="tiny-pill filter-chip" data-filter="vulnerability_detail">Intel</button>
    </div>
    <div id="status" class="status-bar" style="margin-top:0.5rem;"></div>
  </section>

  <section style="margin-top:1rem;" id="results-section">
    <div id="results"></div>
  </section>
</main>

<style>
.filter-chip { cursor:pointer; opacity:0.55; transition:opacity .15s,background .15s; }
.filter-chip:hover { opacity:0.85; }
.filter-chip.active { opacity:1; background:var(--accent,#4af); color:#000; }

.intel-card {
  background: var(--surface,#1a1a2e);
  border: 1px solid var(--border,#2a2a4a);
  border-radius: 8px;
  padding: 1rem 1.1rem;
  margin-bottom: 0.65rem;
  transition: border-color .15s;
}
.intel-card:hover { border-color: var(--accent,#4af); }

.intel-card-header {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  flex-wrap: wrap;
  margin-bottom: 0.4rem;
}
.intel-card-name {
  font-weight: 700;
  font-size: 1rem;
  color: var(--accent,#4af);
  text-decoration: none;
  line-height: 1.3;
}
.intel-card-name:hover { text-decoration: underline; }

.cvss-badge {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 0.15rem 0.45rem;
  border-radius: 4px;
  white-space: nowrap;
}
.cvss-critical { background:#7f1d1d; color:#fca5a5; }
.cvss-high     { background:#7c2d12; color:#fdba74; }
.cvss-medium   { background:#78350f; color:#fde68a; }
.cvss-low      { background:#14532d; color:#86efac; }
.cvss-none     { background:#1e293b; color:#94a3b8; }

.intel-desc {
  font-size: 0.875rem;
  color: var(--text-muted, #94a3b8);
  line-height: 1.55;
  margin: 0.3rem 0;
}

.intel-meta {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: 0.5rem;
  align-items: center;
}
.intel-meta a {
  font-size: 0.78rem;
  color: var(--accent,#4af);
  opacity: 0.8;
  text-decoration: none;
}
.intel-meta a:hover { opacity: 1; text-decoration: underline; }
.tag-list { display:flex; gap:0.3rem; flex-wrap:wrap; }
</style>

<script>
(function () {
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  const qInput = document.getElementById("q-input");
  const resultsDiv = document.getElementById("results");
  const status = document.getElementById("status");
  let allItems = [];
  let activeFilter = "";

  // ── Severity badge ─────────────────────────────────────────────────────
  function cvssClass(sev) {
    const s = (sev||"").toLowerCase();
    if (s === "critical") return "cvss-critical";
    if (s === "high")     return "cvss-high";
    if (s === "medium")   return "cvss-medium";
    if (s === "low")      return "cvss-low";
    return "cvss-none";
  }

  function cvssLabel(item) {
    if (item.cvss) {
      const sev = item.severity || "";
      return `<span class="cvss-badge ${cvssClass(sev)}" title="CVSS ${esc(item.cvss)}">${sev ? esc(sev.toUpperCase()) : ""} ${esc(item.cvss)}</span>`;
    }
    return "";
  }

  function kindPill(kind) {
    if (!kind) return "";
    const label = kind.replace(/_/g," ");
    return `<span class="tiny-pill">${esc(label)}</span>`;
  }

  function tagsList(tags) {
    if (!tags || !tags.length) return "";
    return `<div class="tag-list">${tags.slice(0,6).map(t=>`<span class="tiny-pill" style="opacity:0.7;">${esc(t)}</span>`).join("")}</div>`;
  }

  function externalLinks(item) {
    const links = [];
    if (item.nvd_link)   links.push(`<a href="${esc(item.nvd_link)}" target="_blank" rel="noopener">NVD ↗</a>`);
    if (item.mitre_link) links.push(`<a href="${esc(item.mitre_link)}" target="_blank" rel="noopener">ATT&amp;CK ↗</a>`);
    return links.join("");
  }

  // ── Render one card ────────────────────────────────────────────────────
  function renderCard(item) {
    const corpusKinds = new Set(["cve", "gcve", "exploit", "exploitdb"]);
    const detailHref = corpusKinds.has(item.kind)
      ? (item.detail_url || `/entities/${esc(item.id)}`)
      : (item.kind === "technique" || item.kind === "attack_pattern" || item.kind === "actor" || item.kind === "malware" || item.kind === "tool"
          ? `/entities/${esc(item.id)}`
          : (item.detail_url || `/entities/${esc(item.id)}`));

    const desc = item.description || "";
    const snippet = desc.length > 320 ? desc.slice(0, 320) + "…" : desc;

    return `<div class="intel-card">
      <div class="intel-card-header">
        <a class="intel-card-name" href="${detailHref}">${esc(item.name)}</a>
        ${cvssLabel(item)}
        ${kindPill(item.kind)}
        ${item.confidence ? `<span class="tiny-pill" style="opacity:0.65;" title="Confidence">conf: ${esc(item.confidence)}</span>` : ""}
      </div>
      ${snippet ? `<p class="intel-desc">${esc(snippet)}</p>` : ""}
      ${(item.tags?.length || item.nvd_link || item.mitre_link) ? `
      <div class="intel-meta">
        ${tagsList(item.tags)}
        ${externalLinks(item)}
      </div>` : ""}
    </div>`;
  }

  // ── Filter + render ────────────────────────────────────────────────────
  function renderResults() {
    const filtered = activeFilter
      ? allItems.filter(i => i.kind === activeFilter)
      : allItems;

    if (!filtered.length) {
      resultsDiv.innerHTML = '<div class="empty-state">No results' +
        (activeFilter ? ` for filter "${activeFilter}"` : "") + '.</div>';
      return;
    }
    resultsDiv.innerHTML = filtered.map(renderCard).join("");
  }

  // ── Search ─────────────────────────────────────────────────────────────
  async function doSearch(q, opts = {}) {
    if (!q.trim()) { resultsDiv.innerHTML = ""; status.textContent = ""; allItems = []; return; }
    status.textContent = "Searching…";
    resultsDiv.innerHTML = "";
    try {
      const webFallback = opts.webFallback ?? document.getElementById("web-fallback-toggle").checked;
      const webOnly = !!opts.webOnly;
      const webCategory = document.getElementById("web-category").value || "general";
      const resp = await fetch(
        `/api/v1/search/?q=${encodeURIComponent(q)}&limit=30&web_fallback=${webFallback ? "true" : "false"}&web_only=${webOnly ? "true" : "false"}&web_categories=${encodeURIComponent(webCategory)}`,
        { credentials: "same-origin" }
      );
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const data = await resp.json();
      allItems = Array.isArray(data) ? data : (data.items || data.results || []);
      status.textContent = allItems.length ? `${allItems.length} result(s)` : "";
      if (!allItems.length) {
        resultsDiv.innerHTML = '<div class="empty-state">No results found. Try <strong>Extend Web</strong>.</div>';
        return;
      }
      renderResults();
    } catch (err) {
      status.textContent = "Error: " + err.message;
      resultsDiv.innerHTML = '<div class="empty-state">Search failed.</div>';
    }
  }

  // ── Events ─────────────────────────────────────────────────────────────
  document.getElementById("search-btn").addEventListener("click", () => doSearch(qInput.value, { webOnly: false }));
  document.getElementById("search-web-btn").addEventListener("click", () => doSearch(qInput.value, { webOnly: true, webFallback: true }));
  qInput.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(qInput.value, { webOnly: false }); });

  document.getElementById("filter-bar").addEventListener("click", e => {
    const chip = e.target.closest(".filter-chip");
    if (!chip) return;
    document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    activeFilter = chip.dataset.filter || "";
    renderResults();
  });

  // Auto-trigger from ?q= param
  const params = new URLSearchParams(window.location.search);
  const initial = params.get("q") || "";
  if (initial) {
    qInput.value = initial;
    doSearch(initial);
  }
})();
</script>
{% endblock %}
