{% extends "base.html" %}
{% block title %}Intel Search · z.je{% endblock %}
{% block content %}
<main class="page-shell">
  <header class="page-header">
    <h1>Threat Intel Search</h1>
    <p class="page-sub">Full-text search across the threat intelligence knowledge base.</p>
  </header>

  <section class="panel">
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;">
      <input class="form-input mono" type="text" id="q-input" placeholder="Search threats, CVEs, actors…" style="flex:1;min-width:14rem;">
      <button class="button" id="search-btn">Search</button>
    </div>
    <div id="status" class="status-bar" style="margin-top:0.5rem;"></div>
  </section>

  <section class="panel" style="margin-top:1rem;">
    <div id="results" class="result-list"></div>
  </section>
</main>

<script>
(function () {
  function esc(s) {
    return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  const qInput = document.getElementById("q-input");
  const resultsDiv = document.getElementById("results");
  const status = document.getElementById("status");

  async function doSearch(q) {
    if (!q.trim()) { resultsDiv.innerHTML = ""; status.textContent = ""; return; }
    status.textContent = "Searching…";
    resultsDiv.innerHTML = "";
    try {
      const resp = await fetch(`/api/v1/search/?q=${encodeURIComponent(q)}&limit=20`, { credentials: "same-origin" });
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const data = await resp.json();
      const items = Array.isArray(data) ? data : (data.items || data.results || []);
      status.textContent = items.length ? `${items.length} result(s)` : "";
      if (!items.length) {
        resultsDiv.innerHTML = '<div class="empty-state">No results found.</div>';
        return;
      }
      resultsDiv.innerHTML = items.map(item => {
        const name = item.name || item.title || item.value || item.id;
        const kind = item.kind || item.type || "";
        const desc = item.description || item.summary || "";
        const snippet = desc.length > 200 ? desc.slice(0, 200) + "…" : desc;
        return `<div class="card" style="margin-bottom:0.5rem;">
          <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;">
            <a href="/entities/${esc(item.id)}" style="font-weight:600;">${esc(name)}</a>
            ${kind ? `<span class="tiny-pill">${esc(kind)}</span>` : ""}
          </div>
          ${snippet ? `<p class="subtle" style="margin-top:0.4rem;font-size:0.88rem;line-height:1.5;">${esc(snippet)}</p>` : ""}
        </div>`;
      }).join("");
    } catch (err) {
      status.textContent = "Error: " + err.message;
      resultsDiv.innerHTML = '<div class="empty-state">Search failed.</div>';
    }
  }

  document.getElementById("search-btn").addEventListener("click", () => doSearch(qInput.value));
  qInput.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(qInput.value); });

  // Auto-trigger from ?q= param
  const params = new URLSearchParams(window.location.search);
  const initial = params.get("q") || "";
  if (initial) {
    qInput.value = initial;
    doSearch(initial);
  }
})();
</script>
{% endblock %}
