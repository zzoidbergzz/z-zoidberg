{% extends "base.html" %}
{% block title %}Graph · z.je{% endblock %}
{% block content %}
<main class="page-shell">
  <header class="page-header">
    <h1>Graph</h1>
    <p class="page-sub">Entity relationship graph with click-through pivoting.</p>
  </header>

  <section class="panel">
    <div class="row" style="gap:0.65rem;flex-wrap:wrap;align-items:center;">
      <input class="form-input mono" type="text" id="entity-search" placeholder="Filter visible nodes…" style="min-width:14rem;flex:1;" />
      <label class="subtle" for="depth" style="font-size:0.82rem;">Depth</label>
      <input id="depth" type="range" min="1" max="4" value="2" style="width:8rem;" />
      <span id="depth-val" class="tiny-pill">2</span>
      <select class="form-input" id="layout" style="min-width:10rem;">
        <option value="barnesHut">Force</option>
        <option value="hierarchicalUD">Hierarchical ↓</option>
        <option value="repulsion">Repulsion</option>
      </select>
      <button class="button-muted" id="reload-btn">Reload</button>
      <button class="button-muted" id="fit-btn">Fit</button>
      <span id="stats" class="subtle" style="font-size:0.8rem;"></span>
    </div>
    <div id="focus-chip" style="margin-top:0.6rem;display:none;"></div>
    <div id="status" class="status-bar" style="margin-top:0.6rem;"></div>
  </section>

  <section class="panel" style="margin-top:1rem;position:relative;">
    <div id="network" style="height:70vh;min-height:26rem;border:1px solid var(--border,#2a2a4a);border-radius:8px;background:var(--surface-2,#101829);"></div>
    <aside id="info-panel" class="card" style="display:none;position:absolute;top:1rem;right:1rem;max-width:22rem;max-height:calc(70vh - 2rem);overflow:auto;">
      <h3 id="info-name" style="margin-top:0;"></h3>
      <div id="info-fields"></div>
      <a id="info-link" href="#" class="button-muted" style="display:none;margin-top:0.8rem;">Open entity</a>
    </aside>
  </section>
</main>

<script>
(() => {
  const params = new URLSearchParams(window.location.search);
  const focusedEntityId = (params.get("entity_id") || "").trim();
  const depthInput = document.getElementById("depth");
  const depthVal = document.getElementById("depth-val");
  const status = document.getElementById("status");
  const stats = document.getElementById("stats");
  const focusChip = document.getElementById("focus-chip");
  const nodeFilter = document.getElementById("entity-search");
  const layoutSelect = document.getElementById("layout");
  const infoPanel = document.getElementById("info-panel");
  const infoName = document.getElementById("info-name");
  const infoFields = document.getElementById("info-fields");
  const infoLink = document.getElementById("info-link");
  const apiKey = localStorage.getItem("sk_api_key") || "";
  const headers = apiKey ? {"X-API-Key": apiKey} : {};

  const kindColors = {
    cve: "#db584d", vulnerability: "#d3665a", malware: "#a95acc", actor: "#8368da", tool: "#4e9ce6",
    ip_address: "#4fb794", domain: "#3aa0a8", url: "#61b2db", hash: "#d2a056", indicator: "#9a92f0",
    campaign: "#d4834f", technique: "#51729f", attack_pattern: "#51729f", subtechnique: "#6a83ad",
    tactic: "#5e70c7", organization: "#6f9b65", product: "#b88d55", report: "#8d95ad", other: "#6f7f8f",
  };

  let network = null;
  let allNodes = null;
  let allEdges = null;
  let rawData = null;

  function esc(v) {
    return String(v == null ? "" : v)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function applyFocusChip() {
    if (!focusedEntityId) {
      focusChip.style.display = "none";
      return;
    }
    focusChip.style.display = "";
    focusChip.innerHTML = `<span class="tiny-pill">Focused entity: <span class="mono">${esc(focusedEntityId)}</span></span>`;
  }

  function renderGraph(data) {
    const layout = layoutSelect.value;
    const nodes = (data.nodes || []).map((n) => ({
      id: n.id,
      label: n.label || n.id,
      rawLabel: n.label || n.id,
      group: n.group || "other",
      color: {
        background: kindColors[n.group] || "#6f7f8f",
        border: "rgba(15,20,33,0.9)",
        highlight: {background: "#6f8cff", border: "#d4dbff"},
      },
      font: {color: "#edf2ff", size: 11},
      shape: "dot",
      size: 14,
    }));
    const edges = (data.edges || []).map((e) => ({
      id: e.id,
      from: e.from,
      to: e.to,
      label: e.label || "",
      arrows: {to: {enabled: true, scaleFactor: 0.45}},
      color: {color: "rgba(120,138,172,0.5)", highlight: "#8ea8ff"},
      font: {color: "#8da1c9", size: 9, strokeWidth: 0},
      smooth: {type: "continuous"},
    }));

    allNodes = new vis.DataSet(nodes);
    allEdges = new vis.DataSet(edges);
    const options = {
      physics: layout === "barnesHut"
        ? {enabled: true, barnesHut: {gravitationalConstant: -2800, springLength: 120, springConstant: 0.04}}
        : layout === "repulsion"
          ? {enabled: true, repulsion: {nodeDistance: 170, springLength: 180}}
          : {enabled: false},
      layout: layout === "hierarchicalUD"
        ? {hierarchical: {direction: "UD", sortMethod: "directed", levelSeparation: 130}}
        : {},
      interaction: {hover: true, tooltipDelay: 80},
    };

    if (network) network.destroy();
    network = new vis.Network(document.getElementById("network"), {nodes: allNodes, edges: allEdges}, options);
    network.on("click", onNodeClick);
    stats.textContent = `${nodes.length} nodes · ${edges.length} edges`;
  }

  function onNodeClick(params) {
    if (!params.nodes.length) {
      infoPanel.style.display = "none";
      return;
    }
    const id = params.nodes[0];
    const node = allNodes.get(id);
    const outEdges = allEdges.get({filter: (e) => e.from === id});
    const inEdges = allEdges.get({filter: (e) => e.to === id});
    infoName.textContent = node.label || id;

    let html = `
      <div class="subtle" style="font-size:0.75rem;text-transform:uppercase;">Kind</div>
      <div><span class="tiny-pill">${esc(node.group || "other")}</span></div>
      <div class="subtle" style="font-size:0.75rem;text-transform:uppercase;margin-top:0.6rem;">ID</div>
      <div class="mono" style="font-size:0.74rem;word-break:break-all;">${esc(id)}</div>
    `;
    if (outEdges.length) {
      html += `<div class="subtle" style="font-size:0.75rem;text-transform:uppercase;margin-top:0.6rem;">Outbound (${outEdges.length})</div>`;
      outEdges.slice(0, 8).forEach((e) => {
        const target = allNodes.get(e.to);
        html += `<div class="subtle" style="font-size:0.8rem;margin-top:0.2rem;">${esc(e.label)} → ${esc(target ? target.label : e.to)}</div>`;
      });
    }
    if (inEdges.length) {
      html += `<div class="subtle" style="font-size:0.75rem;text-transform:uppercase;margin-top:0.6rem;">Inbound (${inEdges.length})</div>`;
      inEdges.slice(0, 8).forEach((e) => {
        const source = allNodes.get(e.from);
        html += `<div class="subtle" style="font-size:0.8rem;margin-top:0.2rem;">${esc(source ? source.label : e.from)} → ${esc(e.label)}</div>`;
      });
    }
    infoFields.innerHTML = html;
    infoLink.href = `/entities/${encodeURIComponent(id)}`;
    infoLink.style.display = "inline-flex";
    infoPanel.style.display = "block";
  }

  function filterNodes() {
    if (!allNodes) return;
    const q = nodeFilter.value.trim().toLowerCase();
    allNodes.forEach((n) => {
      const match = !q || String(n.label || "").toLowerCase().includes(q) || String(n.id).toLowerCase().includes(q);
      allNodes.update({id: n.id, hidden: !match});
    });
  }

  async function loadGraph() {
    const depth = depthInput.value;
    status.textContent = "Loading…";
    const query = new URLSearchParams({fmt: "vis", depth});
    if (focusedEntityId) query.set("entity_id", focusedEntityId);
    try {
      const resp = await fetch(`/api/v1/graph/?${query.toString()}`, {headers, credentials: "same-origin"});
      if (!resp.ok) {
        const body = await resp.text().catch(() => "");
        status.textContent = `Graph load failed (${resp.status})${body ? `: ${body.slice(0, 180)}` : ""}`;
        return;
      }
      rawData = await resp.json();
      status.textContent = "";
      renderGraph(rawData);
      filterNodes();
    } catch (err) {
      status.textContent = `Graph load failed: ${err.message || err}`;
    }
  }

  depthInput.addEventListener("input", () => { depthVal.textContent = depthInput.value; });
  layoutSelect.addEventListener("change", () => { if (rawData) renderGraph(rawData); });
  nodeFilter.addEventListener("input", filterNodes);
  document.getElementById("reload-btn").addEventListener("click", loadGraph);
  document.getElementById("fit-btn").addEventListener("click", () => { if (network) network.fit(); });

  const depthFromQuery = parseInt(params.get("depth") || "", 10);
  if (Number.isFinite(depthFromQuery) && depthFromQuery >= 1 && depthFromQuery <= 4) {
    depthInput.value = String(depthFromQuery);
  }
  depthVal.textContent = depthInput.value;
  applyFocusChip();
  loadGraph();
})();
</script>
{% endblock %}
