{% extends "base.html" %}
{% block title %}Entity Detail · z.je{% endblock %}
{% block content %}
<main class="page-shell">
  <div id="status" class="status-bar"></div>

  <!-- Header -->
  <header class="page-header" id="entity-header" style="display:none;">
    <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
      <span id="entity-icon" style="font-size:2rem;"></span>
      <div>
        <h1 id="entity-name" style="margin:0;"></h1>
        <div id="entity-badges" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.4rem;"></div>
      </div>
    </div>
  </header>

  <div class="grid-2" style="margin-top:1rem;" id="main-grid" style="display:none;">
    <!-- Details card -->
    <section class="card" id="details-card" style="display:none;">
      <div class="section-title">Details</div>
      <div id="meta-grid" style="margin-top:0.75rem;display:grid;grid-template-columns:auto 1fr;gap:0.4rem 1rem;"></div>
      <div id="description-block" style="margin-top:1rem;display:none;">
        <div class="section-title" style="font-size:0.8rem;margin-bottom:0.4rem;">Description</div>
        <p id="description-text" class="subtle" style="font-size:0.9rem;line-height:1.6;"></p>
      </div>
    </section>

    <!-- External References -->
    <section class="card" id="refs-card" style="display:none;">
      <div class="section-title">External References</div>
      <div id="refs-list" class="result-list" style="margin-top:0.75rem;"></div>
    </section>
  </div>

  <!-- Relationships -->
  <section class="panel" id="rels-card" style="margin-top:1rem;display:none;">
    <div class="section-title">Relationships</div>
    <table class="table" style="margin-top:0.75rem;">
      <thead><tr><th>Relation</th><th>Target</th><th>Kind</th></tr></thead>
      <tbody id="rels-body"></tbody>
    </table>
  </section>

  <!-- Graph link -->
  <section class="panel" id="graph-link-section" style="margin-top:1rem;display:none;">
    <a id="graph-link" class="button-muted" href="#">View in Graph</a>
  </section>

  <!-- Ask AI -->
  <section class="card" id="ask-ai-card" style="margin-top:1rem;display:none;">
    <div class="section-title">Ask AI <span class="subtle" style="font-size:0.8rem;font-weight:400;">· Claude (Anthropic)</span></div>
    <details style="margin-top:0.75rem;">
      <summary class="button-muted" style="cursor:pointer;display:inline-block;">Ask about this entity</summary>
      <div style="margin-top:0.75rem;">
        <textarea class="form-input mono" id="ai-question" rows="3" style="width:100%;resize:vertical;font-size:0.9rem;"></textarea>
        <div style="display:flex;gap:0.75rem;align-items:center;margin-top:0.5rem;flex-wrap:wrap;">
          <button class="button" id="ask-btn">Ask Claude</button>
          <span id="ask-status" class="tiny-pill"></span>
        </div>
        <div id="ai-response" class="card" style="margin-top:0.75rem;display:none;white-space:pre-wrap;font-size:0.9rem;line-height:1.6;"></div>
      </div>
    </details>
  </section>
</main>

<script>
(function () {
  const KIND_ICONS = {
    cve:'🔴', malware:'🦠', actor:'🕵️', tool:'🔧', technique:'⚡',
    tactic:'🎯', vulnerability:'🔓', domain:'🌐', ip_address:'📍',
    hash:'#️⃣', campaign:'⚔️', report:'📄'
  };

  function esc(s) {
    return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  const entityId = window.location.pathname.split("/").pop();
  const status = document.getElementById("status");

  async function loadEntity() {
    status.textContent = "Loading…";
    try {
      const resp = await fetch(`/api/v1/entities/${entityId}`, { credentials: "same-origin" });
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const e = await resp.json();
      status.textContent = "";
      renderEntity(e);
    } catch (err) {
      status.textContent = "Error loading entity: " + err.message;
    }
  }

  function renderEntity(e) {
    const icon = KIND_ICONS[e.kind] || "📦";
    document.getElementById("entity-icon").textContent = icon;
    document.getElementById("entity-name").textContent = e.name || e.id;
    document.title = (e.name || e.id) + " · z.je";

    const badges = document.getElementById("entity-badges");
    badges.innerHTML = `<span class="tiny-pill">${esc(e.kind || "")}</span>`;
    if (e.tlp) badges.innerHTML += ` <span class="tiny-pill">TLP:${esc(e.tlp)}</span>`;
    if (e.confidence != null) badges.innerHTML += ` <span class="tiny-pill">conf:${esc(e.confidence)}</span>`;
    document.getElementById("entity-header").style.display = "";

    // Meta grid
    const meta = document.getElementById("meta-grid");
    const fields = [
      ["ID", e.id],
      ["Kind", e.kind],
      ["Aliases", (e.aliases || []).join(", ") || null],
      ["Created", e.created_at ? new Date(e.created_at).toLocaleString() : null],
      ["Updated", e.updated_at ? new Date(e.updated_at).toLocaleString() : null],
      ["TLP", e.tlp],
      ["Confidence", e.confidence],
      ["Source", e.source],
    ];
    meta.innerHTML = fields.filter(([,v]) => v != null && v !== "").map(([k,v]) =>
      `<span class="subtle" style="font-size:0.85rem;">${esc(k)}</span><span class="mono" style="font-size:0.85rem;">${esc(v)}</span>`
    ).join("");
    document.getElementById("details-card").style.display = "";

    if (e.description) {
      document.getElementById("description-text").textContent = e.description;
      document.getElementById("description-block").style.display = "";
    }

    // External refs
    const refs = e.external_references || [];
    if (refs.length) {
      const refsList = document.getElementById("refs-list");
      refsList.innerHTML = refs.map(r => `
        <div class="card" style="padding:0.5rem 0.75rem;">
          <strong class="mono" style="font-size:0.85rem;">${esc(r.source_name || r.name || "")}</strong>
          ${r.external_id ? `<span class="tiny-pill" style="margin-left:0.4rem;">${esc(r.external_id)}</span>` : ""}
          ${r.url ? `<br><a href="${esc(r.url)}" target="_blank" rel="noopener" style="font-size:0.82rem;">${esc(r.url)}</a>` : ""}
        </div>
      `).join("");
      document.getElementById("refs-card").style.display = "";
    }

    document.getElementById("main-grid").style.display = "";

    // Graph link
    const graphLink = document.getElementById("graph-link");
    graphLink.href = `/graph?entity_id=${encodeURIComponent(entityId)}`;
    document.getElementById("graph-link-section").style.display = "";

    // Ask AI setup
    document.getElementById("ai-question").value = `Explain this ${e.kind || "entity"} "${e.name || e.id}" and its security relevance.`;
    document.getElementById("ask-ai-card").style.display = "";

    // Store context for AI
    window._entityContext = JSON.stringify({
      id: e.id, kind: e.kind, name: e.name,
      description: e.description,
      aliases: e.aliases,
      tlp: e.tlp,
    }, null, 2);

    // Load graph / relationships
    loadRelationships();
  }

  async function loadRelationships() {
    try {
      const resp = await fetch(`/api/v1/graph/?entity_id=${encodeURIComponent(entityId)}&depth=1&fmt=vis`, { credentials: "same-origin" });
      if (!resp.ok) return;
      const g = await resp.json();
      const edges = g.edges || [];
      const nodes = g.nodes || [];
      if (!edges.length) return;
      const nodeMap = {};
      (nodes).forEach(n => nodeMap[n.id] = n);
      const tbody = document.getElementById("rels-body");
      tbody.innerHTML = edges.map(edge => {
        const target = nodeMap[edge.to] || { id: edge.to, label: edge.to };
        const targetName = target.label || target.id;
        const targetKind = target.kind || "";
        const rel = edge.label || edge.type || "related";
        const icon = KIND_ICONS[targetKind] || "📦";
        return `<tr>
          <td><span class="tiny-pill">${esc(rel)}</span></td>
          <td><a href="/entities/${esc(edge.to)}">${icon} ${esc(targetName)}</a></td>
          <td><span class="tiny-pill">${esc(targetKind)}</span></td>
        </tr>`;
      }).join("");
      document.getElementById("rels-card").style.display = "";
    } catch (_) {}
  }

  // Ask AI
  document.getElementById("ask-btn").addEventListener("click", async () => {
    const question = document.getElementById("ai-question").value.trim();
    if (!question) return;
    const askStatus = document.getElementById("ask-status");
    const aiResponse = document.getElementById("ai-response");
    askStatus.textContent = "Asking Claude…";
    aiResponse.style.display = "none";
    try {
      const resp = await fetch("/api/v1/ask/", {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question,
          context: window._entityContext || "",
          model: "claude-3-5-haiku-20241022",
        }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: "error" }));
        throw new Error(err.detail || "HTTP " + resp.status);
      }
      const data = await resp.json();
      askStatus.textContent = data.model || "";
      aiResponse.textContent = data.answer;
      aiResponse.style.display = "";
    } catch (err) {
      askStatus.textContent = "Error: " + err.message;
    }
  });

  loadEntity();
})();
</script>
{% endblock %}
