# OpenClaw Gateway MCP Configuration
# Add this to your gateway config under mcp.servers

# For SSE transport (remote hosted SK instance):
mcp:
  servers:
    security-knowledge:
      transport: sse
      url: "https://your-sk-host/api/v1/mcp/sse"
      headers:
        X-API-Key: "${SK_API_KEY}"

