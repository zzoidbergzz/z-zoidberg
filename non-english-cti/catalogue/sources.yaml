# A. NATIONAL CERTs / CSIRTs / GOVERNMENT CYBER AGENCIES
# ============================================================================

- source_name: "CERT-FR"
  url: "https://www.cert.ssi.gouv.fr/"
  country: "FR"
  region: "Western Europe"
  language: "fr"
  source_type: "cert"
  collection_method: "rss"
  authentication: "none"
  update_frequency: "daily"
  intelligence_value: 5
  reliability: 5
  legal_ethical_risk: 1
  collection_priority: 1
  notes: "Primary French national CERT. Rich advisories, threat reports, CTI bulletins, IOCs. One of the most prolific non-English CERTs."
  tos_robots_rate: "Public government service. Standard rate limits apply."
  example_intelligence: "CERTFR-2026-AVI-0514: Multiple vulnerabilities in Curl"
  feeds_endpoints:
    - type: "rss"
      url: "https://www.cert.ssi.gouv.fr/feed/"
      description: "Main RSS feed for all CERT-FR publications"
    - type: "html"
      url: "https://www.cert.ssi.gouv.fr/alerte/"
      description: "Security alerts listing"
    - type: "html"
      url: "https://www.cert.ssi.gouv.fr/avis/"
      description: "Advisories listing"
    - type: "html"
      url: "https://www.cert.ssi.gouv.fr/ti/"
      description: "Threat intelligence reports"

